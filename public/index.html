<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>File Dispatcher</title>
<style>
 :root{font-family:system-ui,sans-serif}body{margin:0;background:#0d1117;color:#e6edf3}
 header{padding:1.2rem;text-align:center}h1{margin:0;font-size:1.5rem}.sub{color:#8b97a7;font-size:.85rem}
 .wrap{max-width:980px;margin:0 auto;padding:0 1rem 3rem}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
 textarea{width:100%;box-sizing:border-box;height:340px;background:#0b0f16;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:.7rem;font-family:ui-monospace,monospace;font-size:.82rem}
 .controls{display:flex;gap:.5rem;align-items:center;margin:.6rem 0}
 select{padding:.5rem;border-radius:8px;border:1px solid #30363d;background:#0b0f16;color:#fff}
 button{padding:.55rem 1.2rem;border:0;border-radius:8px;background:#8957e5;color:#fff;font-weight:600;cursor:pointer}
 .tree{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem;height:340px;overflow:auto}
 .folder{font-weight:700;color:#d2a8ff;margin-top:.6rem}
 .file{color:#adbac7;font-size:.85rem;margin-left:1.2rem;font-family:ui-monospace,monospace}
 @media(max-width:820px){.grid{grid-template-columns:1fr}}
</style></head><body>
<header><h1>🗃️ File Dispatcher</h1><div class="sub">AI file organization · Cloudflare Workers</div></header>
<div class="wrap">
 <div class="controls">
  <label>Strategy <select id="strategy"><option value="smart">Smart (AI by topic + type)</option><option value="extension">By extension</option></select></label>
  <button id="go">Organize</button><span id="msg" class="sub"></span>
 </div>
 <div class="grid">
  <textarea id="files" placeholder="One filename per line…"></textarea>
  <div class="tree" id="tree"><span class="sub">Proposed structure appears here.</span></div>
 </div>
 <button id="copy" style="margin-top:.6rem;background:#30363d">Copy plan (JSON)</button>
</div>
<script>
const $=id=>document.getElementById(id);let lastPlan=null;
$("files").value=["IMG_2231.jpg","vacation_beach.png","budget_2025.xlsx","invoice_acme.pdf","resume.docx","app.py","utils.py","demo.mp4","notes.md","taxes_2024.pdf","song.mp3","backup.zip"].join("\n");
$("go").onclick=async()=>{
 const files=$("files").value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
 if(!files.length){$("msg").textContent="Add some filenames";return;}
 $("msg").textContent="Organizing…";$("tree").innerHTML="<span class=sub>Working…</span>";
 const d=await (await fetch("/api/organize",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({files,strategy:$("strategy").value})})).json();
 if(d.error){$("msg").textContent=d.error;return;}
 lastPlan=d.plan;$("msg").textContent=d.strategy+(d.note?(" — "+d.note):"");
 $("tree").innerHTML=Object.entries(d.plan).map(([folder,fs])=>`<div class="folder">📁 ${folder}</div>`+fs.map(f=>`<div class="file">${f}</div>`).join("")).join("");
};
$("copy").onclick=()=>{if(lastPlan)navigator.clipboard.writeText(JSON.stringify(lastPlan,null,2)).then(()=>$("msg").textContent="Copied!");};
</script>
</body></html>
